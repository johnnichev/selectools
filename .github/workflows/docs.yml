name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install MkDocs and plugins
        run: pip install mkdocs-material mkdocs-git-revision-date-localized-plugin mkdocs-glightbox mkdocs-minify-plugin

      - name: Copy root files into docs
        run: |
          cp CHANGELOG.md docs/CHANGELOG.md
          cp CONTRIBUTING.md docs/CONTRIBUTING.md 2>/dev/null || true

      - name: Build documentation
        run: mkdocs build

      - name: Replace root with landing page
        run: |
          cp landing/index.html site/index.html
          cp landing/eval-report-preview.html site/eval-report-preview.html 2>/dev/null || true
          cp landing/trace-preview.html site/trace-preview.html 2>/dev/null || true
          mkdir -p site/simulations
          cp landing/simulations/index.html site/simulations/index.html 2>/dev/null || true

      - name: Copy landing favicon and assets
        # Landing index.html references /favicon.svg, /favicon.ico,
        # /apple-touch-icon.png, and /assets/og-image.png. Without these
        # the X/Twitter share preview 404s and the browser tab falls back
        # to the MkDocs Material favicon. Merge into the existing
        # site/assets dir rather than replacing it (Material ships its
        # own assets there).
        run: |
          cp landing/favicon.svg site/favicon.svg
          cp landing/favicon.ico site/favicon.ico
          cp landing/apple-touch-icon.png site/apple-touch-icon.png
          mkdir -p site/assets
          cp -R landing/assets/. site/assets/

      - name: Install selectools (for builder assembly)
        run: pip install -e .

      - name: Build static builder HTML
        run: |
          mkdir -p site/builder
          python3 -c "
          from selectools.serve.builder import BUILDER_HTML
          with open('site/builder/index.html', 'w', encoding='utf-8') as f:
              f.write(BUILDER_HTML)
          print('Builder HTML:', len(BUILDER_HTML), 'chars → site/builder/index.html')
          "

      - name: Build examples gallery
        run: |
          mkdir -p site/examples
          python3 scripts/build_examples_gallery.py > site/examples/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
